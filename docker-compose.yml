services:
  # ChromaDB vector database
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/data
    environment:
      - ALLOW_RESET=true

  # MongoDB
  mongo:
    image: mongo:7
    container_name: ai-hiring-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Python AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    ports:
      - "8000:8000"
    depends_on:
      - chromadb
      - mongo
    environment:
      - CHROMA_HTTP_HOST=chromadb
      - CHROMA_HTTP_PORT=8000
      - CHROMA_PERSIST_DIRECTORY=./chroma_data
      - CHROMA_COLLECTION_NAME=knowledge_base_documents
      - APP_NAME=AI Hiring JD Service
      - AI_PROVIDER=gemini
      - LLM_TEMPERATURE=0.4
      - LLM_TIMEOUT_SECONDS=45
      - EMBEDDING_PROVIDER=sentence-transformers
      - EMBEDDING_MODEL_NAME=all-MiniLM-L6-v2

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - ai-service
    environment:
      - MONGO_URI=mongodb://mongo:27017/ai_hiring_system
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-dev_change_me_to_a_long_random_secret}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:3000,http://localhost:5173
      - AI_SERVICE_URL=http://ai-service:8000
      - JITSI_BASE_URL=https://meet.jit.si
      - MEETING_ROOM_PREFIX=aihiring

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api

volumes:
  chroma-data:
  mongo-data:
